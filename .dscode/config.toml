# DS Code 项目配置
# 完整字段见 src/dscode/config.py

[model]
default = "deepseek-v4-flash"
router = "deepseek-v4-flash"
executor = "deepseek-v4-pro"

[magi]
max_rounds = 20
max_steps = 40

[safety]
unsafe = false

[telemetry]
cache_enabled = true

