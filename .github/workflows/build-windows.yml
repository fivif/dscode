name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.3.1)'
        required: true
        default: '0.3.1'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: crates/dscode-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ''

      - name: Install frontend dependencies
        run: npm ci
        working-directory: crates/dscode-desktop/ui

      - name: Install tauri-cli (prebuilt binary)
        run: npm install -g @tauri-apps/cli@^2

      - name: Build Tauri (Windows MSI)
        run: tauri build --bundles msi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Find MSI installer
        id: find-msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) {
            Write-Host "No MSI found, checking for exe..."
            $msi = Get-ChildItem -Path "target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($msi) {
            "installer=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Found: $($msi.FullName)"
          } else {
            Write-Error "No installer found!"
            exit 1
          }

      - name: Upload to Release
        if: steps.find-msi.outputs.installer != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: ${{ steps.find-msi.outputs.installer }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
