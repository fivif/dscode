name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.3.1)'
        required: true
        default: '0.3.1'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: crates/dscode-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ''

      - name: Install frontend dependencies
        run: npm ci
        working-directory: crates/dscode-desktop/ui

      - name: Install tauri-cli (prebuilt binary)
        run: npm install -g @tauri-apps/cli@^2

      - name: Build Tauri (Windows MSI)
        run: tauri build --bundles msi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload MSI to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          files: target/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
